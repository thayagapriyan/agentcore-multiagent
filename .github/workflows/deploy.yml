name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: id-token to assume the deploy role, no long-lived keys.
permissions:
  id-token: write
  contents: read

# One deploy at a time; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.4

      - name: Terraform init
        working-directory: infra
        run: terraform init

      # Resolve the repo name from the agent_name variable's default in
      # variables.tf — read non-interactively (no `terraform console`, which is an
      # interactive REPL that hangs in CI). Drift-proof: it's the same value the
      # module uses to name the repo. Then ensure the repo exists BEFORE the build
      # via a direct, idempotent ECR API call. We deliberately do NOT pre-create
      # with a targeted terraform apply: a partial apply can't coexist with pending
      # `moved {}` blocks. Terraform still owns the repo — the single full apply
      # below reconciles it (and runs the moves).
      - name: Ensure ECR repository
        id: tf_ecr
        working-directory: infra
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          REPO=$(sed -n '/variable "agent_name"/,/}/ s/.*default *= *"\([^"]*\)".*/\1/p' variables.tf)
          if [ -z "$REPO" ]; then echo "could not resolve agent_name default" >&2; exit 1; fi
          echo "Resolved ECR repository: $REPO"
          aws ecr describe-repositories --repository-names "$REPO" --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$REPO" --region "$AWS_REGION" >/dev/null
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "ecr_url=${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${REPO}" >> "$GITHUB_OUTPUT"

      # Build from the REPO ROOT (monorepo workspace build) so the image can see
      # packages/common, which the supervisor imports. Pushed to the just-created
      # repo before the full terraform apply — so the image the runtime points at
      # always exists first.
      - name: Build & push (ARM64)
        env:
          ECR_URI: ${{ steps.tf_ecr.outputs.ecr_url }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -f agents/supervisor/Dockerfile \
            -t "$ECR_URI:${{ github.sha }}" \
            -t "$ECR_URI:latest" \
            .

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform apply -auto-approve -var="image_tag=${{ github.sha }}"

      # Deployed-state check: invoke the live runtime with a math prompt and require
      # a result field (proves the supervisor + math_specialist round-trip).
      - name: Smoke test
        working-directory: infra
        run: |
          ARN=$(terraform output -raw agent_runtime_arn)
          aws bedrock-agentcore invoke-agent-runtime \
            --agent-runtime-arn "$ARN" \
            --payload "$(printf '%s' '{"prompt":"add 2 and 3"}' | base64)" \
            --region "${{ vars.AWS_REGION }}" \
            smoke.json
          cat smoke.json
          grep -q result smoke.json

      # A2A door check: the A2A-protocol runtime only accepts bearer tokens (JWT
      # authorizer), so fetch one from Cognito (initiate-auth is an unauthenticated
      # API) and require the agent card to come back through the public endpoint.
      - name: Smoke test (A2A)
        working-directory: infra
        run: |
          A2A_URL=$(terraform output -raw a2a_endpoint_url)
          CLIENT_ID=$(terraform output -raw a2a_cognito_client_id)
          USERNAME=$(terraform output -raw a2a_tester_username)
          PASSWORD=$(terraform output -raw a2a_tester_password)
          TOKEN=$(aws cognito-idp initiate-auth \
            --auth-flow USER_PASSWORD_AUTH \
            --client-id "$CLIENT_ID" \
            --auth-parameters USERNAME="$USERNAME",PASSWORD="$PASSWORD" \
            --region "${{ vars.AWS_REGION }}" \
            --query 'AuthenticationResult.AccessToken' --output text)
          curl -sf "${A2A_URL}.well-known/agent-card.json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-Amzn-Bedrock-AgentCore-Runtime-Session-Id: $(uuidgen)" \
            -o card.json
          cat card.json
          grep -q '"Multi-Agent Supervisor"' card.json
