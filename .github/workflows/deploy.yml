name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: id-token to assume the deploy role, no long-lived keys.
permissions:
  id-token: write
  contents: read

# One deploy at a time; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.4

      - name: Terraform init
        working-directory: infra
        run: terraform init

      # Resolve each agent's repo name from its agent_name variable default in
      # variables.tf — read non-interactively (no `terraform console`, which is an
      # interactive REPL that hangs in CI). Drift-proof: same value the module uses
      # to name the repo. Then make each repo BOTH exist AND be tracked in state
      # before the build, idempotently:
      #   1. create it via the ECR API if AWS doesn't have it (so the image push
      #      below has a target — runtimes must point at an image that exists first);
      #   2. `terraform import` it into the module address if state doesn't already
      #      track it — otherwise the full apply's CreateRepository hits
      #      RepositoryAlreadyExists (the repo exists in AWS but not in TF state, as
      #      happens the first time a new agent deploys, or after out-of-band repo
      #      deletion left state pointing at a now-recreated repo).
      # We deliberately do NOT pre-create with a targeted terraform apply: a partial
      # apply can't coexist with any pending `moved {}` blocks. The single full apply
      # below still owns and reconciles everything.
      - name: Ensure ECR repositories
        id: tf_ecr
        working-directory: infra
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          SUP_REPO=$(sed -n '/variable "agent_name"/,/}/ s/.*default *= *"\([^"]*\)".*/\1/p' variables.tf)
          ROUTER_REPO=$(sed -n '/variable "router_agent_name"/,/}/ s/.*default *= *"\([^"]*\)".*/\1/p' variables.tf)
          CRITIC_REPO=$(sed -n '/variable "critic_agent_name"/,/}/ s/.*default *= *"\([^"]*\)".*/\1/p' variables.tf)
          KNOWLEDGE_REPO=$(sed -n '/variable "knowledge_agent_name"/,/}/ s/.*default *= *"\([^"]*\)".*/\1/p' variables.tf)
          RESEARCHER_REPO=$(sed -n '/variable "researcher_agent_name"/,/}/ s/.*default *= *"\([^"]*\)".*/\1/p' variables.tf)
          if [ -z "$SUP_REPO" ] || [ -z "$ROUTER_REPO" ] || [ -z "$CRITIC_REPO" ] || [ -z "$KNOWLEDGE_REPO" ] || [ -z "$RESEARCHER_REPO" ]; then
            echo "could not resolve one or more agent_name defaults" >&2; exit 1
          fi
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)

          ensure_repo() {            # $1 = repo name, $2 = terraform module address
            local repo="$1" addr="$2"
            echo "Ensuring ECR repository: $repo ($addr)"
            aws ecr describe-repositories --repository-names "$repo" --region "$AWS_REGION" >/dev/null 2>&1 \
              || aws ecr create-repository --repository-name "$repo" --region "$AWS_REGION" >/dev/null
            # Import into state only if not already tracked (import is not idempotent
            # — it errors if the address already exists, so guard on state list).
            if ! terraform state list "$addr" >/dev/null 2>&1; then
              echo "Importing $repo into $addr"
              terraform import "$addr" "$repo"
            fi
          }

          ensure_repo "$SUP_REPO"        'module.supervisor.aws_ecr_repository.this'
          ensure_repo "$ROUTER_REPO"     'module.router.aws_ecr_repository.this'
          ensure_repo "$CRITIC_REPO"     'module.critic.aws_ecr_repository.this'
          ensure_repo "$KNOWLEDGE_REPO"  'module.knowledge.aws_ecr_repository.this'
          ensure_repo "$RESEARCHER_REPO" 'module.researcher.aws_ecr_repository.this'

          echo "supervisor_ecr_url=${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${SUP_REPO}" >> "$GITHUB_OUTPUT"
          echo "router_ecr_url=${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ROUTER_REPO}" >> "$GITHUB_OUTPUT"
          echo "critic_ecr_url=${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${CRITIC_REPO}" >> "$GITHUB_OUTPUT"
          echo "knowledge_ecr_url=${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${KNOWLEDGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "researcher_ecr_url=${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${RESEARCHER_REPO}" >> "$GITHUB_OUTPUT"

      # Build each agent from the REPO ROOT (monorepo workspace build) so the image
      # can see packages/common, which both agents import. Pushed to the just-created
      # repos before the full terraform apply — so the images the runtimes point at
      # always exist first. Both images are tagged with the same git sha.
      - name: Build & push supervisor (ARM64)
        env:
          ECR_URI: ${{ steps.tf_ecr.outputs.supervisor_ecr_url }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -f agents/supervisor/Dockerfile \
            -t "$ECR_URI:${{ github.sha }}" \
            -t "$ECR_URI:latest" \
            .

      - name: Build & push router (ARM64)
        env:
          ECR_URI: ${{ steps.tf_ecr.outputs.router_ecr_url }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -f agents/router/Dockerfile \
            -t "$ECR_URI:${{ github.sha }}" \
            -t "$ECR_URI:latest" \
            .

      - name: Build & push critic (ARM64)
        env:
          ECR_URI: ${{ steps.tf_ecr.outputs.critic_ecr_url }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -f agents/critic/Dockerfile \
            -t "$ECR_URI:${{ github.sha }}" \
            -t "$ECR_URI:latest" \
            .

      - name: Build & push knowledge (ARM64)
        env:
          ECR_URI: ${{ steps.tf_ecr.outputs.knowledge_ecr_url }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -f agents/knowledge/Dockerfile \
            -t "$ECR_URI:${{ github.sha }}" \
            -t "$ECR_URI:latest" \
            .

      - name: Build & push researcher (ARM64)
        env:
          ECR_URI: ${{ steps.tf_ecr.outputs.researcher_ecr_url }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -f agents/researcher/Dockerfile \
            -t "$ECR_URI:${{ github.sha }}" \
            -t "$ECR_URI:latest" \
            .

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform apply -auto-approve -var="image_tag=${{ github.sha }}"

      # Deployed-state check (supervisor): invoke its HTTP runtime with a math
      # prompt and require a result field (proves the supervisor + math_specialist
      # round-trip). Selects the ARN from the per-agent runtime_arns map (iter 5).
      - name: Smoke test (supervisor)
        working-directory: infra
        run: |
          ARN=$(terraform output -json runtime_arns | jq -r '.supervisor')
          aws bedrock-agentcore invoke-agent-runtime \
            --agent-runtime-arn "$ARN" \
            --payload "$(printf '%s' '{"prompt":"add 2 and 3"}' | base64)" \
            --region "${{ vars.AWS_REGION }}" \
            smoke.json
          cat smoke.json
          grep -q result smoke.json

      # Deployed-state check (router): invoke its HTTP runtime with a billing prompt
      # and require a result field (proves intake → conditional edge → billing →
      # summarize round-trips through the Graph).
      - name: Smoke test (router)
        working-directory: infra
        run: |
          ARN=$(terraform output -json runtime_arns | jq -r '.router')
          aws bedrock-agentcore invoke-agent-runtime \
            --agent-runtime-arn "$ARN" \
            --payload "$(printf '%s' '{"prompt":"I was double charged on my invoice, can I get a refund?"}' | base64)" \
            --region "${{ vars.AWS_REGION }}" \
            smoke-router.json
          cat smoke-router.json
          grep -q result smoke-router.json

      # Deployed-state check (critic): invoke its HTTP runtime and require a result
      # field (proves the generator↔critic reflection loop runs and returns a
      # best-effort answer within the iteration cap).
      - name: Smoke test (critic)
        working-directory: infra
        run: |
          ARN=$(terraform output -json runtime_arns | jq -r '.critic')
          aws bedrock-agentcore invoke-agent-runtime \
            --agent-runtime-arn "$ARN" \
            --payload "$(printf '%s' '{"prompt":"Write a one-sentence tagline for a coffee shop."}' | base64)" \
            --region "${{ vars.AWS_REGION }}" \
            smoke-critic.json
          cat smoke-critic.json
          grep -q result smoke-critic.json

      # Deployed-state check (knowledge MCP runtime): the knowledge runtime serves the
      # MCP protocol (not /invocations), gated by a Cognito JWT authorizer. Mint a
      # bearer token for its pool, then POST an MCP `tools/list` request to its /mcp
      # endpoint and require the kb_lookup tool to come back — proves the MCP server is
      # live and reachable with the same token the researcher uses. The MCP streamable
      # transport replies with SSE, so Accept must allow text/event-stream.
      - name: Smoke test (knowledge MCP)
        working-directory: infra
        run: |
          MCP_URL=$(terraform output -raw knowledge_mcp_url)
          CLIENT_ID=$(terraform output -raw knowledge_mcp_cognito_client_id)
          USERNAME=$(terraform output -raw knowledge_mcp_bot_username)
          PASSWORD=$(terraform output -raw knowledge_mcp_bot_password)
          TOKEN=$(aws cognito-idp initiate-auth \
            --auth-flow USER_PASSWORD_AUTH \
            --client-id "$CLIENT_ID" \
            --auth-parameters USERNAME="$USERNAME",PASSWORD="$PASSWORD" \
            --region "${{ vars.AWS_REGION }}" \
            --query 'AuthenticationResult.AccessToken' --output text)
          curl -sf "$MCP_URL" \
            -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -H "X-Amzn-Bedrock-AgentCore-Runtime-Session-Id: $(uuidgen)" \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' \
            -o kb-tools.txt
          cat kb-tools.txt
          grep -q 'kb_lookup' kb-tools.txt

      # Deployed-state check (researcher → knowledge over MCP): invoke the researcher's
      # HTTP runtime with a KNOWN KB topic. The researcher fetches the fact from the
      # knowledge runtime over MCP and grounds its answer in it — so requiring a phrase
      # that can ONLY come from the kb_lookup fact proves the cross-runtime hop fired.
      - name: Smoke test (researcher MCP hop)
        working-directory: infra
        run: |
          ARN=$(terraform output -json runtime_arns | jq -r '.researcher')
          aws bedrock-agentcore invoke-agent-runtime \
            --agent-runtime-arn "$ARN" \
            --payload "$(printf '%s' '{"prompt":"Using the knowledge base, what is MCP?"}' | base64)" \
            --region "${{ vars.AWS_REGION }}" \
            smoke-researcher.json
          cat smoke-researcher.json
          grep -q result smoke-researcher.json
          # The kb_lookup fact for "mcp" mentions "Model Context Protocol" — its
          # presence in the grounded answer is proof the remote tool was called.
          grep -qi 'Model Context Protocol' smoke-researcher.json

      # A2A door check (supervisor): the A2A-protocol runtime only accepts bearer
      # tokens (JWT authorizer), so fetch one from Cognito (initiate-auth is an
      # unauthenticated API) and require the agent card to come back through the
      # public endpoint.
      - name: Smoke test (A2A — supervisor)
        working-directory: infra
        run: |
          A2A_URL=$(terraform output -raw a2a_endpoint_url)
          CLIENT_ID=$(terraform output -raw a2a_cognito_client_id)
          USERNAME=$(terraform output -raw a2a_tester_username)
          PASSWORD=$(terraform output -raw a2a_tester_password)
          TOKEN=$(aws cognito-idp initiate-auth \
            --auth-flow USER_PASSWORD_AUTH \
            --client-id "$CLIENT_ID" \
            --auth-parameters USERNAME="$USERNAME",PASSWORD="$PASSWORD" \
            --region "${{ vars.AWS_REGION }}" \
            --query 'AuthenticationResult.AccessToken' --output text)
          curl -sf "${A2A_URL}.well-known/agent-card.json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-Amzn-Bedrock-AgentCore-Runtime-Session-Id: $(uuidgen)" \
            -o card.json
          cat card.json
          grep -q '"Multi-Agent Supervisor"' card.json

      # A2A door check (router): same flow against the router's own Cognito pool +
      # A2A runtime; require the router's agent card through its public endpoint.
      - name: Smoke test (A2A — router)
        working-directory: infra
        run: |
          A2A_URL=$(terraform output -raw router_a2a_endpoint_url)
          CLIENT_ID=$(terraform output -raw router_a2a_cognito_client_id)
          USERNAME=$(terraform output -raw router_a2a_tester_username)
          PASSWORD=$(terraform output -raw router_a2a_tester_password)
          TOKEN=$(aws cognito-idp initiate-auth \
            --auth-flow USER_PASSWORD_AUTH \
            --client-id "$CLIENT_ID" \
            --auth-parameters USERNAME="$USERNAME",PASSWORD="$PASSWORD" \
            --region "${{ vars.AWS_REGION }}" \
            --query 'AuthenticationResult.AccessToken' --output text)
          curl -sf "${A2A_URL}.well-known/agent-card.json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-Amzn-Bedrock-AgentCore-Runtime-Session-Id: $(uuidgen)" \
            -o router-card.json
          cat router-card.json
          grep -q '"Multi-Agent Router"' router-card.json

      # A2A door check (critic): same flow against the critic's own Cognito pool +
      # A2A runtime; require the critic's agent card through its public endpoint.
      - name: Smoke test (A2A — critic)
        working-directory: infra
        run: |
          A2A_URL=$(terraform output -raw critic_a2a_endpoint_url)
          CLIENT_ID=$(terraform output -raw critic_a2a_cognito_client_id)
          USERNAME=$(terraform output -raw critic_a2a_tester_username)
          PASSWORD=$(terraform output -raw critic_a2a_tester_password)
          TOKEN=$(aws cognito-idp initiate-auth \
            --auth-flow USER_PASSWORD_AUTH \
            --client-id "$CLIENT_ID" \
            --auth-parameters USERNAME="$USERNAME",PASSWORD="$PASSWORD" \
            --region "${{ vars.AWS_REGION }}" \
            --query 'AuthenticationResult.AccessToken' --output text)
          curl -sf "${A2A_URL}.well-known/agent-card.json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-Amzn-Bedrock-AgentCore-Runtime-Session-Id: $(uuidgen)" \
            -o critic-card.json
          cat critic-card.json
          grep -q '"Multi-Agent Critic"' critic-card.json

      # A2A door check (researcher): same flow against the researcher's own Cognito
      # pool + A2A runtime; require the researcher's agent card through its public
      # endpoint. (The knowledge agent has NO A2A door — it is internal, reached only
      # over MCP — so there is no card check for it.)
      - name: Smoke test (A2A — researcher)
        working-directory: infra
        run: |
          A2A_URL=$(terraform output -raw researcher_a2a_endpoint_url)
          CLIENT_ID=$(terraform output -raw researcher_a2a_cognito_client_id)
          USERNAME=$(terraform output -raw researcher_a2a_tester_username)
          PASSWORD=$(terraform output -raw researcher_a2a_tester_password)
          TOKEN=$(aws cognito-idp initiate-auth \
            --auth-flow USER_PASSWORD_AUTH \
            --client-id "$CLIENT_ID" \
            --auth-parameters USERNAME="$USERNAME",PASSWORD="$PASSWORD" \
            --region "${{ vars.AWS_REGION }}" \
            --query 'AuthenticationResult.AccessToken' --output text)
          curl -sf "${A2A_URL}.well-known/agent-card.json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-Amzn-Bedrock-AgentCore-Runtime-Session-Id: $(uuidgen)" \
            -o researcher-card.json
          cat researcher-card.json
          grep -q '"Multi-Agent Researcher"' researcher-card.json

      # --- LLM-quality evals (promptfoo) — run POST-DEPLOY against the live
      # runtimes. Unlike the smoke tests (one prompt, presence of a result field),
      # these grade classification/delegation quality across a dataset via Bedrock
      # llm-rubric. They need AWS creds + live runtimes, which is why they live here
      # and not in PR CI. Deterministic routing is already gated by Vitest in ci.yml.
      # promptfoo needs Node >=20.20 / >=22; the deploy job otherwise has no Node.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Eval (promptfoo — supervisor + router + critic + researcher)
        working-directory: infra
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          # Optional: set the PROMPTFOO_API_KEY repo secret to publish each run to
          # your promptfoo cloud account and print a shareable results URL. If the
          # secret is unset, the eval still runs and still GATES the deploy (offline
          # pass/fail) — sharing is the only thing skipped.
          PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
        run: |
          # Select each agent's live ARN from the per-agent map; the custom provider
          # (eval/agentcore-provider.js) reads this and calls invoke-agent-runtime.
          export RUNTIME_ARNS="$(terraform output -json runtime_arns)"
          echo "RUNTIME_ARNS=$RUNTIME_ARNS"

          if [ -n "$PROMPTFOO_API_KEY" ]; then
            npx -y promptfoo@latest auth login --api-key "$PROMPTFOO_API_KEY"
          else
            echo "PROMPTFOO_API_KEY not set — running evals offline (no cloud share)."
          fi

          # Eval each agent; `eval` exits non-zero on assertion failure, so a failed
          # eval fails the deploy. When authed, `share` publishes that run and prints
          # its URL into the Actions log.
          for agent in supervisor router critic researcher; do
            echo "::group::promptfoo eval — $agent"
            npx -y promptfoo@latest eval \
              -c "../agents/$agent/eval/promptfooconfig.yaml" \
              -o "eval-$agent.json" \
              --no-progress-bar
            if [ -n "$PROMPTFOO_API_KEY" ]; then
              echo "Sharing $agent eval results:"
              npx -y promptfoo@latest share -y || echo "share failed (non-fatal)"
            fi
            echo "::endgroup::"
          done
