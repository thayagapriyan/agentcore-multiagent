name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: id-token to assume the deploy role, no long-lived keys.
permissions:
  id-token: write
  contents: read

# One deploy at a time; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.4

      - name: Terraform init
        working-directory: infra
        run: terraform init

      # Create the ECR repo (and its lifecycle policy) BEFORE the build, so the
      # push has somewhere to land on a cold first deploy. A deliberate partial
      # apply via -target; the full apply below reconciles the rest. The repo name
      # is read back from terraform output so it always tracks var.agent_name and
      # can't drift from a manually-set Actions variable.
      - name: Pre-create ECR repository
        id: tf_ecr
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -target=module.supervisor.aws_ecr_repository.this \
            -target=module.supervisor.aws_ecr_lifecycle_policy.this
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      # Build from the REPO ROOT (monorepo workspace build) so the image can see
      # packages/common, which the supervisor imports. Pushed to the just-created
      # repo before the full terraform apply — so the image the runtime points at
      # always exists first.
      - name: Build & push (ARM64)
        env:
          ECR_URI: ${{ steps.tf_ecr.outputs.ecr_url }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -f agents/supervisor/Dockerfile \
            -t "$ECR_URI:${{ github.sha }}" \
            -t "$ECR_URI:latest" \
            .

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform apply -auto-approve -var="image_tag=${{ github.sha }}"

      # Deployed-state check: invoke the live runtime with a math prompt and require
      # a result field (proves the supervisor + math_specialist round-trip).
      - name: Smoke test
        working-directory: infra
        run: |
          ARN=$(terraform output -raw agent_runtime_arn)
          aws bedrock-agentcore invoke-agent-runtime \
            --agent-runtime-arn "$ARN" \
            --payload "$(printf '%s' '{"prompt":"add 2 and 3"}' | base64)" \
            --region "${{ vars.AWS_REGION }}" \
            smoke.json
          cat smoke.json
          grep -q result smoke.json
