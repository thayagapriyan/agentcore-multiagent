name: CI

on:
  pull_request:
    branches: [main]

# No AWS access on PRs — checks are static only.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Monorepo: install all workspaces from the root.
      - name: Install
        run: npm install

      # Build the shared package first — agents import its emitted .d.ts types.
      - name: Build common
        run: npm run build --workspace @multiagent/common

      - name: Typecheck supervisor
        working-directory: agents/supervisor
        run: npx tsc --noEmit

      - name: Typecheck router
        working-directory: agents/router
        run: npx tsc --noEmit

      - name: Typecheck critic
        working-directory: agents/critic
        run: npx tsc --noEmit

      - name: Typecheck knowledge
        working-directory: agents/knowledge
        run: npx tsc --noEmit

      - name: Typecheck researcher
        working-directory: agents/researcher
        run: npx tsc --noEmit

      # Deterministic unit tests (Vitest) — routing/registry logic, no Bedrock, no
      # AWS creds needed. This is the regression gate: a change to shared code that
      # breaks an agent's routing contract turns this red on the PR. LLM-quality
      # evals (promptfoo) run post-deploy instead (they need AWS + live runtimes).
      - name: Unit tests
        run: npm test

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.4

      - name: Terraform format check
        working-directory: infra
        run: terraform fmt -check -recursive

      # validate needs init, but the S3 backend requires AWS creds we don't have
      # on PRs. -backend=false initializes providers only, which is enough to
      # validate the configuration.
      - name: Terraform validate
        working-directory: infra
        run: |
          terraform init -backend=false
          terraform validate
